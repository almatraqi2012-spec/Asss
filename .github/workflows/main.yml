name: Asss Auto Run

# 🔥 السر هنا: إلغاء أي نسخة قديمة تعمل حالياً بمجرد دفع كود جديد
concurrency:
  group: dragon-bot-execution
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# 🔥 فرض تشغيل جافا سكريبت على Node 24 لتجنب التحذيرات
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # تم إضافة supabase و gunicorn وباقي المتطلبات ليعمل الكود دون أي نقص
          pip install pyTelegramBotAPI telethon requests flask supabase gunicorn                

      - name: Run Asss Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }} 
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python dra.py
